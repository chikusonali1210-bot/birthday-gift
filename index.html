<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ffd6e0, #ffe6f0);
      text-align: center;
      color: #333;
      overflow-x: hidden;
    }

    .container {
      padding: 30px;
    }

    h1 {
      font-size: 2.5rem;
      color: #ff4d6d;
    }

    p {
      font-size: 1.2rem;
    }

    img {
      width: 80%;
      max-width: 300px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 1.3rem;
      color: #d6336c;
    }

    /* ❤️ Hearts */
    .heart-click {
      position: absolute;
      font-size: 20px;
      animation: floatUp 1s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Hello bubu ❤️</h1>
    <p>yeh gift sabse special hai ...</p>

    <img src="umang.jpeg" alt="Our Photo">

    <br>
    <button class="btn" onclick="startLove()">Click me 💌</button>

    <div id="message" class="hidden">
      I trust you bubu so much ❤️<br>
      No matter what happens, I'll always stay with you 💖
    </div>
  </div>

  <!-- 🎶 Background Music -->
  <audio id="bg-music" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <script>
    function startLove() {
      document.getElementById("message").style.display = "block";
      document.getElementById("bg-music").play();
    }

    // ❤️ hearts on click
    document.addEventListener("click", function(e) {
      let heart = document.createElement("div");
      heart.className = "heart-click";

      let hearts = ["❤️","💖","💕","💗"];
      heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

      heart.style.left = e.pageX + "px";
      heart.style.top = e.pageY + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 1000);
    });
  </script>

</body>
</html>
